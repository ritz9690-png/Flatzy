<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home – Flatzy Nagpur</title>
<link rel="icon" type="image/png" href="favicon.jpeg">
<link rel="stylesheet" href="style.css">
<style>
body { background: var(--dark2); padding-bottom: 72px; }

.welcome-banner {
  background: linear-gradient(120deg, var(--primary) 0%, #0EA5E9 100%);
  padding: 5.5rem 5% 2rem; color: white;
}
.welcome-banner h2 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
.welcome-banner p { opacity: 0.85; font-size: 0.9rem; }

.quick-search {
  background: white; border-radius: 16px; padding: 1rem 1.2rem;
  margin: 1rem 5%; display: flex; gap: 0.8rem; align-items: center;
  box-shadow: var(--shadow-md); border: 1.5px solid var(--border);
}
.quick-search input { flex: 1; border: none; background: transparent; font-family: 'DM Sans',sans-serif; font-size: 0.95rem; color: var(--text); outline: none; }
.quick-search input::placeholder { color: var(--muted); }
.qs-btn { background: var(--primary); color: white; border: none; padding: 0.55rem 1.2rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Syne',sans-serif; font-size: 0.9rem; white-space: nowrap; }

.stats-row { display: flex; gap: 1rem; padding: 0 5% 1.5rem; overflow-x: auto; }
.stat-card { background: white; border: 1.5px solid var(--border); border-radius: 12px; padding: 1rem 1.4rem; min-width: 140px; box-shadow: var(--shadow-sm); flex-shrink: 0; }
.stat-card .num { font-family: 'Syne',sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--primary); }
.stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

.home-section { padding: 0 5% 2rem; }
.home-section-title { font-family: 'Syne',sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.home-section-title a { font-size: 0.85rem; color: var(--primary); font-weight: 600; text-decoration: none; }

.cat-scroll { display: flex; gap: 0.7rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1.5rem; }
.cat-chip { background: white; border: 1.5px solid var(--border); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; color: var(--muted); font-family: 'Syne',sans-serif; flex-shrink: 0; }
.cat-chip.active, .cat-chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

.props-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }

.wish-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
.wish-card { min-width: 220px; background: white; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-sm); flex-shrink: 0; cursor: pointer; transition: all 0.2s; }
.wish-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
.wish-card .wc-img { width: 100%; height: 130px; object-fit: cover; background: #e8f4f8; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.wish-card .wc-img img { width: 100%; height: 130px; object-fit: cover; }
.wish-card .wc-body { padding: 0.75rem; }
.wish-card .wc-title { font-family: 'Syne',sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.wish-card .wc-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
.wish-card .wc-tag { font-size: 0.68rem; background: #f0f9ff; color: #0891b2; border-radius: 6px; padding: 2px 7px; font-weight: 600; }
.wish-card .wc-price { font-size: 0.9rem; color: var(--primary); font-weight: 800; }
.wish-card .wc-loc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: white; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; z-index: 500; box-shadow: 0 -4px 24px rgba(26,111,232,0.08); }
.bn-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.68rem; color: var(--muted); cursor: pointer; font-family: 'Syne',sans-serif; font-weight: 600; padding: 0.3rem 0.8rem; border-radius: 10px; transition: color 0.2s; position: relative; }
.bn-item.active { color: var(--primary); }
.bn-icon { font-size: 1.3rem; }
.bn-badge { position: absolute; top: 0; right: 4px; background: #e11d48; color: white; font-size: 0.6rem; font-weight: 800; border-radius: 50%; width: 15px; height: 15px; display: none; align-items: center; justify-content: center; }
.bn-badge.show { display: flex; }

/* Nav user avatar */
.nav-avatar { width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--primary); }

/* Hover to play */
.card-img-photo { width:100%;height:100%;object-fit:cover;border-radius:inherit;transition:opacity 0.35s ease; }
.card-hover-video { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.35s ease;pointer-events:none;border-radius:inherit;z-index:1; }
.card-img:hover .card-hover-video { opacity:1; }
.card-img:hover .card-img-photo { opacity:0; }
.video-indicator { position:absolute;bottom:44px;left:8px;background:rgba(0,0,0,0.65);color:white;font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;z-index:3;pointer-events:none;backdrop-filter:blur(4px); }
.video-indicator-dot { width:6px;height:6px;background:#ff4444;border-radius:50%;animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)} }
</style>
</head>
<body class="has-bottom-nav">

<!-- TOP NAV -->
<nav class="topnav">
  <a href="index.html" class="logo">
    <img src="favicon.jpeg" alt="Flatzy Logo" style="height:40px;width:auto;display:block;">
    <span>Flat<span style="color:#0ea5e9;">zy</span></span>
  </a>
  <div class="nav-links">
    <a href="home.html" class="active">Home</a>
    <a href="rent.html">Browse</a>
    <a href="owner.html">List Property</a>
  </div>
  <div id="navGuest" style="display:none;gap:0.5rem;align-items:center;">
    <a href="login.html" class="nav-btn outline">Login</a>
    <a href="login.html" class="nav-btn">Sign Up</a>
  </div>
  <div id="navUser" style="display:none;gap:0.5rem;align-items:center;">
    <img id="navPhoto" src="" alt="" class="nav-avatar" style="display:none;">
    <span id="navUserName" style="font-size:0.88rem;font-weight:600;color:var(--text);"></span>
    <button id="navLogoutBtn" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.82rem;">Logout</button>
  </div>
</nav>

<!-- WELCOME -->
<div class="welcome-banner">
  <h2>Good <span id="greetingTime">Morning</span>, <span id="greetingName">Friend</span>! 👋</h2>
  <p>Find your perfect flat in Nagpur. <span id="propCountBadge">0</span> listings available.</p>
</div>

<!-- QUICK SEARCH -->
<div class="quick-search">
  <span style="font-size:1.2rem;">🔍</span>
  <input type="text" id="quickSearchInput" placeholder="Search area, type or price…" oninput="filterProps()">
  <button class="qs-btn" onclick="window.location='rent.html'">Filters</button>
</div>

<!-- STATS -->
<div class="stats-row" id="statsRow"></div>

<!-- CATEGORIES -->
<div class="home-section">
  <div class="cat-scroll" id="catChips">
    <div class="cat-chip active" onclick="filterByType('')" data-type="">All</div>
    <div class="cat-chip" onclick="filterByType('Flat')" data-type="Flat">🏠 Flats</div>
    <div class="cat-chip" onclick="filterByType('PG')" data-type="PG">🏡 PG</div>
    <div class="cat-chip" onclick="filterByType('Hostel')" data-type="Hostel">🏨 Hostel</div>
    <div class="cat-chip" onclick="filterByType('1 BHK')" data-type="1 BHK">1 BHK</div>
    <div class="cat-chip" onclick="filterByType('2 BHK')" data-type="2 BHK">2 BHK</div>
    <div class="cat-chip" onclick="filterByType('3 BHK')" data-type="3 BHK">3 BHK</div>
  </div>
  <div class="home-section-title">
    Available Properties <a href="rent.html">View All →</a>
  </div>
  <div class="props-grid" id="propsGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🏚️</div>
    <p>No properties found. Try a different filter.</p>
  </div>
</div>

<!-- WISHLIST -->
<div class="home-section" id="wishSection" style="display:none;">
  <div class="home-section-title">Saved Properties ❤️</div>
  <div class="wish-scroll" id="wishScroll"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bn-item active" onclick="window.location='home.html'">
    <span class="bn-icon">🏠</span>Home
  </button>
  <button class="bn-item" onclick="window.location='rent.html'">
    <span class="bn-icon">🔍</span>Browse
  </button>
  <button class="bn-item" onclick="window.location='owner.html'">
    <span class="bn-icon" style="background:var(--primary);color:white;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-top:-12px;box-shadow:0 4px 16px rgba(26,111,232,0.4)">+</span>Post
  </button>
  <button class="bn-item" id="bnSaved">
    <span class="bn-icon">❤️</span>Saved
    <span class="bn-badge" id="bnWishBadge"></span>
  </button>
  <button class="bn-item" id="bnProfile">
    <span class="bn-icon" id="bnProfileIcon">👤</span>Profile
  </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1ChJCaBHpAPnvdK7Z7dbST7bTViuBrWg",
  authDomain: "flatzyhomes.firebaseapp.com",
  projectId: "flatzyhomes",
  storageBucket: "flatzyhomes.firebasestorage.app",
  messagingSenderId: "519957313457",
  appId: "1:519957313457:web:1ffc1685819120edd7ef90"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// No demo props — only real Firestore listings

// ── Visitor Ping ─────────────────────────────────────────────────
(async () => {
  try {
    await setDoc(doc(db, 'siteStats', 'visitors'), { count: increment(1) }, { merge: true });
  } catch(e) {}
})();

let allProps = [];
let wishlist = [];
let currentTypeFilter = '';
let currentUser = null;

// ── Auth State ────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  currentUser = user;
  const guestEl = document.getElementById('navGuest');
  const userEl  = document.getElementById('navUser');

  if (user) {
    guestEl.style.display = 'none';
    userEl.style.display  = 'flex';
    document.getElementById('navUserName').textContent = user.displayName?.split(' ')[0] || '';
    if (user.photoURL) {
      const p = document.getElementById('navPhoto');
      p.src = user.photoURL; p.style.display = 'block';
    }
    // Bottom nav profile icon
    document.getElementById('bnProfile').onclick = () => window.location = 'owner.html';
  } else {
    guestEl.style.display = 'flex';
    userEl.style.display  = 'none';
    document.getElementById('bnProfile').onclick = () => window.location = 'login.html';
  }

  document.getElementById('navLogoutBtn').onclick = async () => {
    await signOut(auth);
    localStorage.removeItem('flatzy_user');
    window.location = 'index.html';
  };

  // Greeting
  document.getElementById('greetingName').textContent = user?.displayName?.split(' ')[0] || 'Friend';
  const h = new Date().getHours();
  document.getElementById('greetingTime').textContent = h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening';

  wishlist = JSON.parse(localStorage.getItem('flatzy_wishlist') || '[]');
  updateWishBadge();
  await loadProps();
});

// ── Load props from Firestore ─────────────────────────────────────
async function loadProps() {
  try {
    const snap = await getDocs(collection(db, 'properties'));
    const firestoreProps = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Latest listings pehle (postedAt se sort)
    firestoreProps.sort((a,b) => (b.postedAt||'') > (a.postedAt||'') ? 1 : -1);
    allProps = [...firestoreProps];
  } catch(e) {
    allProps = [];
  }
  document.getElementById('propCountBadge').textContent = allProps.length;
  const areas = [...new Set(allProps.map(p => p.area))];
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${allProps.length}</div><div class="lbl">Total Listings</div></div>
    <div class="stat-card"><div class="num">${areas.length}</div><div class="lbl">Areas Covered</div></div>
    <div class="stat-card"><div class="num">${allProps.filter(p=>p.type==='PG').length}</div><div class="lbl">PG Options</div></div>
    <div class="stat-card"><div class="num">100%</div><div class="lbl">Verified</div></div>
  `;
  renderProps(allProps);
  renderWishlist();
}

// ── Render ────────────────────────────────────────────────────────
function renderProps(list) {
  const grid = document.getElementById('propsGrid');
  const empty = document.getElementById('emptyState');
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(p => {
    const imgHtml = p.mainPhoto
      ? `<img class="card-img-photo" src="${p.mainPhoto}" alt="${p.title}">`
      : `<div class="card-img-placeholder">${p.emoji||'🏠'}</div>`;
    const videoHtml = p.videoUrl
      ? `<video class="card-hover-video" src="${p.videoUrl}" muted loop playsinline preload="none"></video>
         <div class="video-indicator"><span class="video-indicator-dot"></span> Hover to play</div>`
      : '';
    return `
    <div class="property-card" onclick="window.location='view.html?id=${p.id}'"
      onmouseenter="playCardVideo(this)"
      onmouseleave="pauseCardVideo(this)">
      <div class="card-img">${imgHtml}${videoHtml}
        <span class="card-badge">${p.furnish}</span>
        <span class="card-type">${p.type}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-location">📍 ${p.area}, Nagpur</div>
        <div class="card-details">
          <span class="card-detail">🛏 ${p.bhk}</span>
          <span class="card-detail">${p.furnish}</span>
        </div>
        <div class="card-footer">
          <div class="card-price">₹${Number(p.rent).toLocaleString('en-IN')} <span>/mo</span></div>
          <button class="contact-btn" onclick="event.stopPropagation();toggleWish('${p.id}')">${wishlist.includes(p.id)?'❤️':'🤍'} Save</button>
        </div>
      </div>
    </div>
  `;
  }).join('');
}

// ── Hover Video Play/Pause ────────────────────────────────────────
window.playCardVideo = function(card) {
  const video = card.querySelector('.card-hover-video');
  if (!video) return;
  video.play().catch(() => {});
};
window.pauseCardVideo = function(card) {
  const video = card.querySelector('.card-hover-video');
  if (!video) return;
  video.pause();
  video.currentTime = 0;
};

window.filterProps = function() {
  const q = document.getElementById('quickSearchInput').value.toLowerCase();
  let list = allProps;
  if (currentTypeFilter) list = list.filter(p => p.type === currentTypeFilter || p.bhk === currentTypeFilter);
  if (q) list = list.filter(p => p.title.toLowerCase().includes(q) || p.area.toLowerCase().includes(q) || String(p.rent).includes(q));
  renderProps(list);
};

window.filterByType = function(type) {
  currentTypeFilter = type;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.type === type));
  window.filterProps();
};

window.toggleWish = function(id) {
  if (wishlist.includes(id)) { wishlist = wishlist.filter(x => x !== id); showToast('Removed from saved'); }
  else { wishlist.push(id); showToast('Saved to wishlist ❤️'); }
  localStorage.setItem('flatzy_wishlist', JSON.stringify(wishlist));
  updateWishBadge();
  window.filterProps();
  renderWishlist();
};

function renderWishlist() {
  const section = document.getElementById('wishSection');
  const scroll  = document.getElementById('wishScroll');
  const saved = allProps.filter(p => wishlist.includes(p.id));
  if (!saved.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  scroll.innerHTML = saved.map(p => {
    const firstPhoto = (p.photos && p.photos.length) ? p.photos[0] : null;
    const imgHtml = firstPhoto
      ? `<div class="wc-img"><img src="${firstPhoto}" alt="${p.title}" loading="lazy" onerror="this.parentElement.innerHTML='${p.emoji||'🏠'}'"/></div>`
      : `<div class="wc-img">${p.emoji||'🏠'}</div>`;
    return `
    <div class="wish-card" onclick="window.location='wishlist.html'">
      ${imgHtml}
      <div class="wc-body">
        <div class="wc-title">${p.title}</div>
        <div class="wc-tags">
          ${p.bhk ? `<span class="wc-tag">${p.bhk}</span>` : ''}
          ${p.furnish ? `<span class="wc-tag">${p.furnish}</span>` : ''}
        </div>
        <div class="wc-price">₹${Number(p.rent).toLocaleString('en-IN')}/mo</div>
        <div class="wc-loc">📍 ${p.area}</div>
      </div>
    </div>
  `}).join('');
}

function updateWishBadge() {
  const b = document.getElementById('bnWishBadge');
  if (wishlist.length) { b.textContent = wishlist.length; b.classList.add('show'); }
  else b.classList.remove('show');
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
