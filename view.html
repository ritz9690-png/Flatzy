<head>

<style>
body { background: var(--dark2); }

/* ══════════════════════════════════════
   BACK BAR
══════════════════════════════════════ */
.back-bar {
  position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 4%; height: 48px;
  display: flex; align-items: center; gap: 0.8rem;
  box-shadow: 0 2px 12px rgba(26,111,232,0.07);
}
.back-btn {
  background: none; border: none; padding: 0;
  font-size: 1.4rem; color: var(--primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 10px;
  transition: background 0.18s;
  flex-shrink: 0;
}
.back-btn:hover { background: var(--primary-light); }
.back-bar-title {
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
  color: var(--text); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.share-btn {
  background: none; border: none; padding: 0;
  font-size: 1.2rem; cursor: pointer;
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: background 0.18s, color 0.18s;
  flex-shrink: 0;
}
.share-btn:hover { background: var(--primary-light); color: var(--primary); }

/* ══════════════════════════════════════
   MAIN WRAP
══════════════════════════════════════ */
.view-wrap {
  max-width: 820px; margin: 0 auto;
  padding: calc(var(--nav-h) + 48px) 0 100px;
}

/* ══════════════════════════════════════
   GALLERY
══════════════════════════════════════ */
.gallery-wrap {
  position: relative; background: var(--dark3);
  overflow: hidden; touch-action: pan-y;
  user-select: none; -webkit-user-select: none;
}
.gallery-track {
  display: flex; transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}
.gallery-track.no-transition { transition: none; }
.gallery-slide {
  min-width: 100%; height: 300px;
  position: relative; flex-shrink: 0;
}
.gallery-slide img {
  width: 100%; height: 100%; object-fit: cover;
  display: block; cursor: zoom-in;
}
.gallery-placeholder-slide {
  min-width: 100%; height: 300px;
  display: flex; align-items: center; justify-content: center;
  font-size: 6rem; background: var(--primary-light);
}
/* Desktop arrows */
.gallery-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,0.95);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.2rem; color: var(--text);
  box-shadow: 0 3px 16px rgba(0,0,0,0.18);
  transition: all 0.2s; z-index: 10;
  opacity: 0; pointer-events: none;
}
.gallery-wrap:hover .gallery-arrow { opacity: 1; pointer-events: all; }
.gallery-arrow:hover { background: white; transform: translateY(-50%) scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
.gallery-arrow.prev { left: 12px; }
.gallery-arrow.next { right: 12px; }
.gallery-arrow.hidden { display: none !important; }
/* Counter */
.gallery-counter {
  position: absolute; bottom: 14px; right: 14px; z-index: 10;
  background: rgba(0,0,0,0.58); color: white;
  font-size: 0.74rem; font-weight: 700;
  padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px;
}
/* Dots (mobile) */
.gallery-dots {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; z-index: 10;
}
.gallery-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.5); transition: all 0.2s;
}
.gallery-dot.active { background: white; width: 18px; border-radius: 3px; }
/* Thumbnails */
.gallery-thumbs {
  display: flex; gap: 6px; padding: 8px 12px;
  overflow-x: auto; background: white; border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }
.g-thumb {
  min-width: 58px; width: 58px; height: 44px;
  border-radius: 7px; overflow: hidden; cursor: pointer;
  border: 2.5px solid transparent; opacity: 0.5;
  transition: all 0.18s; flex-shrink: 0;
}
.g-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.g-thumb.active { border-color: var(--primary); opacity: 1; transform: scale(1.06); }
.g-thumb:hover { opacity: 0.85; }

/* ══════════════════════════════════════
   CONTENT AREA
══════════════════════════════════════ */
.view-content { padding: 1rem 1rem 0; }

/* ══════════════════════════════════════
   PROPERTY CARD
══════════════════════════════════════ */
.prop-card {
  background: white; border-radius: 20px;
  border: 1.5px solid var(--border);
  padding: 1.4rem 1.4rem 1.6rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.35s ease both;
}
.prop-badge-row {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 0.8rem;
}
.prop-badge {
  background: var(--primary-light); color: var(--primary);
  font-size: 0.72rem; font-weight: 700;
  padding: 0.25rem 0.7rem; border-radius: 20px;
  letter-spacing: 0.3px;
}
.prop-badge.green { background: #D1FAE5; color: #065F46; }
.prop-title {
  font-family: 'Syne', sans-serif; font-size: 1.35rem;
  font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 0.35rem; color: var(--text); line-height: 1.3;
}
.prop-location {
  font-size: 0.87rem; color: var(--muted);
  display: flex; align-items: flex-start; gap: 0.3rem;
  margin-bottom: 1.1rem; line-height: 1.4;
}
.prop-chips {
  display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 1.2rem;
}
.prop-chip {
  background: var(--dark2); border: 1.5px solid var(--border);
  padding: 0.32rem 0.8rem; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600; color: var(--text);
}
.divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }
.prop-price-row {
  display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 0.2rem;
}
.prop-price {
  font-family: 'Syne', sans-serif; font-size: 2rem;
  font-weight: 800; color: var(--primary);
}
.prop-price-unit { font-size: 0.88rem; color: var(--muted); }
.prop-deposit-row {
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.prop-deposit { font-size: 0.82rem; color: var(--muted); }
.deposit-badge {
  background: #D1FAE5; color: #065F46;
  font-size: 0.7rem; font-weight: 700;
  padding: 0.15rem 0.55rem; border-radius: 20px;
}

/* ══════════════════════════════════════
   SECTION TITLE
══════════════════════════════════════ */
.sec-title {
  font-family: 'Syne', sans-serif; font-size: 0.75rem;
  font-weight: 800; color: var(--primary);
  text-transform: uppercase; letter-spacing: 1.2px;
  margin-bottom: 0.75rem; margin-top: 1.3rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.sec-title::after {
  content: ''; flex: 1; height: 1.5px;
  background: linear-gradient(90deg, var(--border), transparent);
  border-radius: 2px;
}

/* ══════════════════════════════════════
   OVERVIEW GRID
══════════════════════════════════════ */
.overview-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem;
}
.ov-item {
  background: var(--dark2); border-radius: 12px;
  padding: 0.75rem 1rem; border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.ov-item:hover { border-color: var(--primary); }
.ov-label {
  font-size: 0.68rem; color: var(--muted);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.ov-val {
  font-size: 0.9rem; font-weight: 700; color: var(--text); margin-top: 0.2rem;
}

/* ══════════════════════════════════════
   AMENITIES
══════════════════════════════════════ */
.amenity-grid {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.amen-pill {
  background: var(--primary-light); color: var(--primary);
  padding: 0.32rem 0.85rem; border-radius: 20px;
  font-size: 0.8rem; font-weight: 600;
  border: 1px solid rgba(26,111,232,0.15);
  transition: all 0.18s;
}
.amen-pill:hover { background: var(--primary); color: white; }

/* ══════════════════════════════════════
   DESCRIPTION
══════════════════════════════════════ */
.prop-desc {
  font-size: 0.9rem; color: var(--muted);
  line-height: 1.78; white-space: pre-line;
}

/* ══════════════════════════════════════
   CONTACT CARD
══════════════════════════════════════ */
.contact-card {
  background: white; border-radius: 20px;
  border: 1.5px solid var(--border);
  padding: 1.4rem; margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.45s ease both;
}
.managed-badge {
  display: flex; align-items: center; gap: 0.55rem;
  background: linear-gradient(135deg, #EBF2FF 0%, #F0F7FF 100%);
  border: 1px solid rgba(26,111,232,0.18);
  border-radius: 12px; padding: 0.65rem 1rem;
  margin-bottom: 1.1rem;
}
.managed-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--primary); display: flex; align-items: center;
  justify-content: center; font-size: 1rem; flex-shrink: 0;
}
.managed-text { flex: 1; }
.managed-title {
  font-family: 'Syne', sans-serif; font-size: 0.85rem;
  font-weight: 800; color: var(--primary);
}
.managed-sub { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
.managed-verified {
  font-size: 0.72rem; font-weight: 700; color: #065F46;
  background: #D1FAE5; padding: 0.2rem 0.55rem; border-radius: 20px;
}

.wa-btn {
  width: 100%; background: linear-gradient(135deg, #25D366 0%, #1da851 100%);
  color: white; border: none; padding: 1rem;
  border-radius: 14px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 0.65rem; transition: all 0.22s;
  box-shadow: 0 4px 20px rgba(37,211,102,0.35);
  position: relative; overflow: hidden;
}
.wa-btn::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  transition: left 0.45s ease;
}
.wa-btn:hover::before { left: 140%; }
.wa-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 28px rgba(37,211,102,0.45); }
.wa-btn:active { transform: scale(0.97); }
.wa-btn svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

.privacy-note {
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  font-size: 0.74rem; color: var(--muted); margin-top: 0.75rem;
}

/* ══════════════════════════════════════
   STICKY BOTTOM CONTACT (mobile)
══════════════════════════════════════ */
.sticky-contact {
  display: none; position: fixed; bottom: var(--bottom-nav-h);
  left: 0; right: 0; z-index: 300;
  background: rgba(255,255,255,0.97); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 0.75rem 1rem;
  box-shadow: 0 -4px 24px rgba(26,111,232,0.10);
}
.sticky-wa-btn {
  width: 100%; background: linear-gradient(135deg, #25D366 0%, #1da851 100%);
  color: white; border: none; padding: 0.85rem;
  border-radius: 14px;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  gap: 0.6rem; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(37,211,102,0.32);
}
.sticky-wa-btn:active { transform: scale(0.97); }
.sticky-wa-btn svg { width: 20px; height: 20px; fill: white; }

/* ══════════════════════════════════════
   SIMILAR PROPERTIES
══════════════════════════════════════ */
.similar-section {
  background: white; border-radius: 20px;
  border: 1.5px solid var(--border);
  padding: 1.4rem; margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.55s ease both;
}
.similar-head {
  font-family: 'Syne', sans-serif; font-size: 1rem;
  font-weight: 800; color: var(--text); margin-bottom: 1rem;
}
.similar-scroll {
  display: flex; gap: 0.85rem;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 4px; margin: 0 -0.2rem; padding: 0 0.2rem 4px;
}
.similar-scroll::-webkit-scrollbar { display: none; }
.similar-card {
  min-width: 180px; background: var(--dark2);
  border-radius: 14px; overflow: hidden;
  border: 1.5px solid var(--border);
  cursor: pointer; flex-shrink: 0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.similar-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.similar-card:active { transform: scale(0.97); }
.similar-img {
  width: 100%; height: 108px;
  background: var(--primary-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; overflow: hidden;
}
.similar-img img { width:100%; height:100%; object-fit:cover; display:block; }
.similar-body { padding: 0.75rem; }
.similar-name {
  font-weight: 700; font-size: 0.82rem;
  margin-bottom: 0.25rem; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.similar-area { font-size: 0.74rem; color: var(--muted); margin-bottom: 0.4rem; }
.similar-price {
  font-family: 'Syne', sans-serif; font-weight: 800;
  color: var(--primary); font-size: 0.92rem;
}

/* ══════════════════════════════════════
   NOT FOUND
══════════════════════════════════════ */
.not-found {
  text-align: center; padding: 5rem 2rem;
  animation: fadeUp 0.4s ease;
}
.not-found-icon { font-size: 4.5rem; margin-bottom: 1rem; }
.not-found h2 {
  font-family: 'Syne', sans-serif; font-size: 1.5rem;
  margin-bottom: 0.5rem;
}
.not-found p { color: var(--muted); margin-bottom: 1.8rem; }

/* ══════════════════════════════════════
   LOADING SKELETON
══════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, var(--dark3) 25%, var(--dark2) 50%, var(--dark3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmerSkel {
  0% { background-position: 200% center; }
  100% { background-position: -200% center; }
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width: 768px) {
  .view-content { padding: 0.8rem 0.8rem 0; }
  .gallery-slide { height: 240px; }
  .gallery-placeholder-slide { height: 240px; }
  .gallery-arrow { display: none !important; }
  .gallery-counter { display: none; }
  .prop-title { font-size: 1.2rem; }
  .prop-price { font-size: 1.75rem; }
  .overview-grid { grid-template-columns: 1fr 1fr; gap: 0.55rem; }
  .contact-card { display: none; } /* hidden — sticky bar shows instead */
  .sticky-contact { display: block; }
  .view-wrap { padding-bottom: calc(var(--bottom-nav-h) + 72px); }
}
@media(min-width: 769px) {
  .gallery-dots { display: none; }
  .gallery-slide { height: 340px; }
  .gallery-placeholder-slide { height: 340px; }
  .view-content { padding: 1.2rem 1.2rem 0; }
  .similar-card { min-width: 200px; }
}
</style>

// ── Auth ──────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  currentUser = user;
  const gEl = document.getElementById('navGuest');
  const uEl = document.getElementById('navUser');
  if (user) {
    gEl.style.display = 'none'; uEl.style.display = 'flex';
    document.getElementById('navUserName').textContent = user.displayName?.split(' ')[0] || '';
    if (user.photoURL) { const p = document.getElementById('navPhoto'); p.src = user.photoURL; p.style.display = 'block'; }
  } else {
    gEl.style.display = 'flex'; uEl.style.display = 'none';
  }
  document.getElementById('navLogoutBtn').onclick = async () => {
    await signOut(auth); localStorage.removeItem('flatzy_user'); window.location = 'index.html';
  };
  await loadAndRender();
});

// ── Load ──────────────────────────────────────────
async function loadAndRender() {
  try {
    const snap = await getDocs(collection(db, 'properties'));
    allProps = [...DEMO, ...snap.docs.map(d => ({ id: d.id, ...d.data() }))];
  } catch { allProps = [...DEMO]; }

  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showNotFound(); return; }
  const prop = allProps.find(p => p.id === id);
  if (!prop) { showNotFound(); return; }
  renderProperty(prop);
}

// ── Gallery: Touch Swipe ───────────────────────────
function initGallerySwipe() {
  const wrap  = document.getElementById('gWrap');
  const track = document.getElementById('gTrack');
  if (!wrap || !track) return;
  const photos = window._currentPhotos;
  if (!photos || photos.length <= 1) return;

  let startX = 0, startY = 0, isDragging = false, moved = false;

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true; moved = false;
    track.classList.add('no-transition');
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dy > Math.abs(dx)) return; // vertical scroll
    moved = true;
    const base = -window._currentIdx * 100;
    track.style.transform = `translateX(calc(${base}% + ${dx}px))`;
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('no-transition');
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) galleryGo(dx < 0 ? 1 : -1);
    else setGalleryTransform(window._currentIdx);
  });
}

function setGalleryTransform(idx) {
  const track = document.getElementById('gTrack');
  if (track) track.style.transform = `translateX(-${idx * 100}%)`;
}

// ── Gallery Nav ───────────────────────────────────
window.galleryGo = function(dir) {
  const photos = window._currentPhotos;
  if (!photos || photos.length <= 1) return;
  window._currentIdx = (window._currentIdx + dir + photos.length) % photos.length;
  updateGallery(window._currentIdx);
};

window.galleryGoTo = function(idx) {
  window._currentIdx = idx;
  updateGallery(idx);
};

function updateGallery(idx) {
  setGalleryTransform(idx);
  // counter
  const counter = document.getElementById('gCounter');
  if (counter) counter.textContent = `${idx+1} / ${window._currentPhotos.length}`;
  // dots
  document.querySelectorAll('.gallery-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  // thumbs
  document.querySelectorAll('.g-thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  const at = document.querySelector('.g-thumb.active');
  if (at) at.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

// ── Lightbox ─────────────────────────────────────
window.openLightbox = function(idx) {
  window._currentIdx = idx || 0;
  const photos = window._currentPhotos;
  if (!photos || !photos.length) return;
  const tryOpen = () => {
    if (typeof window.flOpen === 'function') {
      window.flOpen(photos, window._currentIdx, document.title);
    } else setTimeout(tryOpen, 100);
  };
  tryOpen();
};

// ── WhatsApp Contact ──────────────────────────────
window.contactViaFlatzy = function() {
  if (!currentUser) {
    showToast('Please login first 🔒', true);
    setTimeout(() => window.location = 'login.html', 1500);
    return;
  }
  window.open(_waUrl, '_blank');
  showToast('Opening Flatzy WhatsApp 💬');
};

// ── Share ─────────────────────────────────────────
window.shareProperty = function() {
  const url  = window.location.href;
  const title = document.getElementById('backBarTitle')?.textContent || 'Flatzy Property';
  if (navigator.share) {
    navigator.share({ title, text: `Check out this property on Flatzy: ${title}`, url });
  } else {
    navigator.clipboard?.writeText(url).then(() => showToast('Link copied! 📋'));
  }
};

// ── Navigate similar ─────────────────────────────
window.goToProperty = function(id) {
  window.location = `view.html?id=${id}`;
};

// ── Not Found ─────────────────────────────────────
function showNotFound() {
  document.getElementById('viewWrap').innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🏚️</div>
      <h2>Property Not Found</h2>
      <p>This listing may have been removed or the link is broken.</p>
      <a href="rent.html" class="btn-primary">Browse Properties</a>
    </div>`;
}

// ── Toast ─────────────────────────────────────────
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
