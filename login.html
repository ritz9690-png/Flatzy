<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.jpeg">
<title>Login – Flatzy Nagpur</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: linear-gradient(135deg,#EBF2FF 0%,#F8FBFF 60%,#E8F4FD 100%); min-height: 100vh; display: flex; flex-direction: column; }

.login-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 70px 1rem 2rem;
}
.login-card {
  background: white; border: 1.5px solid var(--border); border-radius: 24px;
  padding: 2rem; width: 100%; max-width: 440px;
  box-shadow: 0 12px 48px rgba(26,111,232,0.12);
  animation: fadeUp 0.4s ease;
}
@media(max-width: 480px) {
  .login-card { border-radius: 20px; padding: 1.5rem; }
  .role-row { gap: 0.6rem; }
  .login-wrap { padding: 65px 0.8rem 1.5rem; }
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

.login-logo { text-align: center; margin-bottom: 0.5rem; font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--primary); letter-spacing:-1px; }
.login-logo span { color:var(--text); }
.login-tagline { text-align:center; font-size:0.85rem; color:var(--muted); margin-bottom:2rem; }

.role-row { display:flex; gap:0.8rem; margin-bottom:1.5rem; }
.role-opt { flex:1; background:var(--dark2); border:2px solid var(--border); border-radius:12px; padding:1rem; text-align:center; cursor:pointer; transition:all 0.2s; }
.role-opt.selected { border-color:var(--primary); background:var(--primary-light); }
.role-icon { font-size:1.6rem; margin-bottom:0.3rem; }
.role-name { font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700; }
.role-desc { font-size:0.72rem; color:var(--muted); margin-top:0.2rem; }

.google-btn {
  display:flex; align-items:center; justify-content:center; gap:0.8rem;
  width:100%; padding:0.9rem; border:1.5px solid #dadce0; background:white;
  border-radius:12px; font-family:'DM Sans',sans-serif; font-size:1rem;
  font-weight:600; cursor:pointer; transition:all 0.2s; color:#3c4043;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.google-btn:hover { border-color:#1a6fe8; background:#f8f9ff; box-shadow: 0 4px 16px rgba(26,111,232,0.15); }
.google-btn:disabled { opacity:0.6; pointer-events:none; }
.google-logo { width:22px; height:22px; }

.info-note {
  background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px;
  padding: 0.8rem 1rem; font-size: 0.8rem; color: #0369a1;
  text-align: center; margin-bottom: 1.5rem; line-height: 1.5;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <a href="index.html" class="logo">
  <img src="favicon.jpeg" alt="Flatzy Logo" style="height:40px;width:auto;display:block;">
  <span>Flat<span style="color:#0ea5e9;">zy</span></span>
</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="rent.html">Browse</a>
  </div>
  <a href="index.html" class="nav-btn outline">← Back to Home</a>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Flat<span>zy</span></div>
    <div class="login-tagline">Nagpur's No-Broker Property Platform</div>

    <!-- ROLE SELECT -->
    <p style="font-size:0.88rem;color:var(--muted);margin-bottom:0.8rem;font-weight:600;">I am a...</p>
    <div class="role-row">
      <div class="role-opt selected" id="role-tenant" onclick="selectRole('tenant')">
        <div class="role-icon">🔍</div>
        <div class="role-name">Tenant</div>
        <div class="role-desc">Looking for a flat/PG</div>
      </div>
      <div class="role-opt" id="role-owner" onclick="selectRole('owner')">
        <div class="role-icon">🏠</div>
        <div class="role-name">Owner</div>
        <div class="role-desc">Have property to rent</div>
      </div>
    </div>

    <div class="info-note">
      🔒 Secure login with your Google account. No password needed.
    </div>

    <!-- GOOGLE LOGIN BUTTON -->
    <button class="google-btn" id="googleBtn" onclick="googleLogin()">
      <svg class="google-logo" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let selectedRole = 'tenant';

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-tenant').classList.toggle('selected', role === 'tenant');
  document.getElementById('role-owner').classList.toggle('selected', role === 'owner');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1ChJCaBHpAPnvdK7Z7dbST7bTViuBrWg",
  authDomain: "flatzyhomes.firebaseapp.com",
  projectId: "flatzyhomes",
  storageBucket: "flatzyhomes.firebasestorage.app",
  messagingSenderId: "519957313457",
  appId: "1:519957313457:web:1ffc1685819120edd7ef90"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// If already logged in, redirect
onAuthStateChanged(auth, user => {
  if (user) {
    const saved = JSON.parse(localStorage.getItem('flatzy_user') || '{}');
    const role = saved.role || 'tenant';
    window.location = role === 'owner' ? 'owner.html' : 'index.html';
  }
});

window.googleLogin = async function() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.innerHTML = `<span style="font-size:1rem">⏳</span> Signing in...`;

  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    // Check if user already exists in Firestore
    const userRef = doc(db, 'users', user.uid);
    const existing = await getDoc(userRef);

    // If existing user, keep their role; new user gets selected role
    const role = existing.exists() ? (existing.data().role || selectedRole) : selectedRole;

    // Save to Firestore
    await setDoc(userRef, {
      name: user.displayName,
      email: user.email,
      uid: user.uid,
      photo: user.photoURL,
      role: role,
      lastLogin: new Date().toISOString()
    }, { merge: true });

    // Save to localStorage
    localStorage.setItem('flatzy_user', JSON.stringify({
      name: user.displayName,
      email: user.email,
      uid: user.uid,
      photo: user.photoURL,
      role: role
    }));

    showToast('Welcome ' + user.displayName + '! ✅');
    setTimeout(() => {
      window.location = role === 'owner' ? 'owner.html' : 'index.html';
    }, 1000);

  } catch(e) {
    let msg = 'Google login failed ❌';
    if (e.code === 'auth/popup-closed-by-user') msg = 'Login cancelled';
    else if (e.code === 'auth/network-request-failed') msg = 'Network error. Check connection.';
    showToast(msg, 'error');
    btn.disabled = false;
    btn.innerHTML = `<svg class="google-logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
  }
};
</script>
</body>
</html>
